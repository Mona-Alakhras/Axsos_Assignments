{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amadon Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/amadon.css' %}">
</head>
<body class="container">

    <div class="row">
        <div class="col-md-8">
            <h2 class="store-title">Amadon Store!</h2>
            
            <table class="table table-bordered amadon-table align-middle">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for product in products %}
                    <tr>
                        <td class="fw-bold">{{ product.name }}</td>
                        <td>${{ product.price }}</td>
                        <td>
                            <form action="{% url 'amadon_buy' %}" method="POST" class="d-flex align-items-center gap-2">
                                {% csrf_token %}
                                <input type="hidden" name="product_id" value="{{ product.id }}">
                                
                                <select name="quantity" class="form-select form-select-sm border-dark" style="width: 70px;">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                </select>
                                
                                <button type="submit" class="btn btn-buy btn-sm">Buy!</button>
                            </form>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center text-muted py-3">No products available in the store.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
