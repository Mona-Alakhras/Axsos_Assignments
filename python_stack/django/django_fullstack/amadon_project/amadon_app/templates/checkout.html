{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amadon Checkout</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/amadon.css' %}">
</head>
<body class="container">

    <h2 class="store-title">Amadon Checkout</h2>

    <div class="checkout-box">
        <h4 class="thanks-msg">Thank you for your business!</h4>
        
        <p class="fs-5">We charged your credit card for <strong>${{ current_charge|stringformat:".2f" }}</strong></p>
        
        <div class="total-info">
            <p class="mb-1 text-muted">
                You have ordered <strong class="text-dark">{{ total_items }}</strong> items so far 
                and spent <strong class="text-dark">${{ total_spent|stringformat:".2f" }}</strong> with Amadon.com!
            </p>
        </div>

        <a href="{% url 'amadon_store' %}" class="btn btn-secondary border-dark fw-bold px-4" style="box-shadow: 2px 2px 0px #333;">Go back</a>
    </div>

</body>
</html>
