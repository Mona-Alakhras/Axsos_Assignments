{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Books</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="main-container">
        <div class="form-box">
            <h2>Add a Book</h2>
            <form action="/add_book" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Title:</label>
                    <input type="text" name="title" required>
                </div>
                <div class="form-group">
                    <label>Desc:</label>
                    <textarea name="desc" required></textarea>
                </div>
                <button type="submit" class="btn-add">Add</button>
            </form>
        </div>

        <div class="table-box">
            <h2>All Books</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for book in all_books %}
                    <tr>
                        <td>{{ book.id }}</td>
                        <td>{{ book.title }}</td>
                        <td><a href="/books/{{ book.id }}">View</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <br>
            <p><a href="/authors">Go to Authors Page -></a></p>
        </div>
    </div>
</body>
</html>
