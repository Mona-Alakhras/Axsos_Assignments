<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV Show {{ show.id }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>TV Show {{ show.id }}</h1>
        <a href="{% url 'all_shows' %}" class="btn btn-secondary">Go Back</a>
    </div>

    <div class="card p-4 mb-4">
        <h3>Title: {{ show.title }}</h3>
        <p><strong>Network:</strong> {{ show.network }}</p>
        <p><strong>Release Date:</strong> {{ show.release_date|date:"F d, Y" }}</p>
        <p><strong>Description:</strong> {{ show.description|default:"No description provided." }}</p>
        <hr>
        <p class="text-muted small">Last Updated: {{ show.updated_at|date:"F d, Y g:i a" }}</p>
    </div>

    <a href="{% url 'edit_show' show.id %}" class="btn btn-warning">Edit</a>
    <a href="{% url 'delete_show' show.id %}" class="btn btn-danger" onclick="return confirm('Are you sure?')">Delete</a>
</body>
</html>
