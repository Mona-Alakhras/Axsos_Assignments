<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Show {{ show.id }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Edit Show {{ show.id }}</h1>
        <a href="{% url 'all_shows' %}" class="btn btn-secondary">Go Back</a>
    </div>

    {% if messages %}
    <div class="alert alert-danger">
        <ul class="mb-0">
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    <form action="{% url 'update_show' show.id %}" method="POST" class="col-md-6">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" value="{{ show.title }}">
        </div>
        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Network</label>
                <input type="text" name="network" class="form-control" value="{{ show.network }}">
            </div>
            <div class="col">
                <label class="form-label">Release Date</label>
                <input type="date" name="release_date" class="form-control" value="{{ show.release_date|date:'Y-m-d' }}">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="4">{{ show.description }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{% url 'detail' show.id %}" class="btn btn-link">Go to Show</a>
    </form>
</body>
</html>
