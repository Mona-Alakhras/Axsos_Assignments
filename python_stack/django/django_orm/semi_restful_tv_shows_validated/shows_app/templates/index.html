{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Shows</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>All Shows</h1>
        <a href="{% url 'new_show' %}" class="btn btn-primary">Add a New Show</a>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Network</th>
                <th>Release Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for show in shows %}
            <tr>
                <td>{{ show.id }}</td>
                <td>{{ show.title }}</td>
                <td>{{ show.network }}</td>
                <td>{{ show.release_date|date:"F d, Y" }}</td>
                <td>
                    <a href="{% url 'detail' show.id %}">Show</a> | 
                    <a href="{% url 'edit_show' show.id %}">Edit</a> | 
                    <a href="{% url 'delete_show' show.id %}" class="text-danger" onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
