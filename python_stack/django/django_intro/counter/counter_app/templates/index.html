<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Assignment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .box {
            display: inline-block;
            border: 2px solid black;
            padding: 30px;
            width: 350px;
        }
        button, input[type="submit"] {
            margin: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Counter</h1>
        
        <h2>{{ request.session.counter }} times</h2>

        <form action="/plus_two" style="display:inline;">
            <button type="submit">+2</button>
        </form>

        <form action="/destroy_session" style="display:inline;">
            <button type="submit">Reset</button>
        </form>

        <hr>

        
        <p style="font-size: 0.9em; color: gray;">
            Actual page views: {{ request.session.visits }}
        </p>
    </div>

</body>
</html>
