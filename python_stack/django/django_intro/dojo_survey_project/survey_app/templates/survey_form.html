{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dojo Survey</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <form action="/result" method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Your Name:</label>
            <input type="text" name="name" required>
        </div>
        
        <div class="form-group">
            <label>Dojo Location:</label>
            <select name="location">
                <option value="San Jose">San Jose</option>
                <option value="Seattle">Seattle</option>
                <option value="Online">Online</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Favorite Language:</label>
            <select name="language">
                <option value="Python">Python</option>
                <option value="JavaScript">JavaScript</option>
                <option value="Java">Java</option>
            </select>
        </div>

        <div class="form-group">
            <label>Experience Level:</label>
            <input type="radio" name="experience" value="Beginner" checked> Beginner
            <input type="radio" name="experience" value="Advanced"> Advanced
        </div>

        <div class="form-group">
            <label>Interests:</label>
            <input type="checkbox" name="interests" value="Web Development"> Web Dev
            <input type="checkbox" name="interests" value="Data Science"> Data Science
        </div>
        
        <div class="form-group">
            <label>Comment (optional):</label>
            <textarea name="comment"></textarea>
        </div>
        
        <button type="submit" class="submit-btn">Button</button>
    </form>

</body>
</html>
