<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Likes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="nav">
        <h1>Network</h1>
    </div>
    <div class="main-container">
        <h1 class="title">Your Feed</h1>
        <div class="left-side">
            <div class="card">
                <div class="profile-page">
                    <img src="user-circle.png" alt="user-photo" class="user-img">
                    <a href="#">Add an avatar</a>
                    <h2>James Doe</h2>
                </div>
                <div class="right-side">
                    <div class="like-card">
                        <div class="content">
                            <h3>Neil M</h3>
                            <div class="content-2">
                                <p><span id="num1">9</span> like(s)</p>
                                <button onclick="increase('num1')" class="btn">Like</button>
                            </div>
                        </div>
                        <p>I just set up this new discord bot, let me<br>
                            Know what you all think .<a href="#">link</a></p>
                    </div>
                    <div class="like-card">
                        <div class="content">
                            <h3>Nichole K</h3>
                            <div class="content-2">
                                <p><span id="num2">12</span> like(s)</p>
                                <button onclick="increase('num2')" class="btn">Like</button>
                            </div>
                        </div>
                        <p>Just finished my<a href="#">next comic</a>,check it out.</p>
                    </div>
                    <div class="like-card">
                        <div class="content">
                            <h3>Jim R</h3>
                            <div class="content-2">
                                <p><span id="num3">9</span> like(s)</p>
                                <button onclick="increase('num3')" class="btn">Like</button>
                            </div>

                        </div>
                        <p>I can't stop listing to the <a href="#">new album</a>.<br>
                            Who else is liking it ?</p>

                    </div>
                </div>
            </div>
        </div>

    </div>
    <script src="script.js"></script>

</body>

</html>
