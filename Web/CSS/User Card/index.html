<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="user-card">
        <div class="nav-header"></div>
        <div class="container">
            <div class="picture">
                <img src="user-circle.png" alt="user pic" class="user-pic">
            </div>
            <div class="user-info">
                <h2>Jane Doe</h2>
                <div class="location">
                    <img src="map-marker.png" alt="map" class="map-pic">
                    <span>Seattle</span>
                </div>
                <p>Developer | Engineer | Problem Solver<br>
                Master of shadows and the Internet</p>
                <div class="edit-profile">
                    <img src="gear.png" alt="gear" class="gear-pic">
                    <p><a href="#">edit profile</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
