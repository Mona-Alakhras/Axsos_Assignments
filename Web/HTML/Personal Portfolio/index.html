<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        img{
            border: 2px solid black;
            background-color: black;
            padding: 3px;

        }
        a{
            color: #155c99;
            text-decoration: underline;
            text-decoration-color: black;
            margin-right: 10px;
        }
        a i{
            color: black;
            font-size: 24px;
            margin-right: 5px;
        }

        table {
            /*هاي بتخلي الحدود خط واحد مش خطين */
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            border-left: 2px solid black; /* خط رأسي فقط */
            border-bottom: 2px solid black; /* خط أفقي فقط */
            padding: 12px;
            text-align: left;
        }
        th:first-child, td:first-child {
            border-left: none;
        }
        /* هيك حذفت الخط السفلي لاخر صف */
        tr:last-child td {
            border-bottom: none;
        }

        th {
            font-weight: bold;
        }

        .code-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px; 
            height: 60px; 
            border: 3px solid black;
            margin: 10px 0;
            font-size: 30px; /* حجم الأيقونة */
           color: black;
        }

        
        label{
            vertical-align: top;
        }

        button {
            background: white;
            border: 2px solid black;
            box-shadow: 3px 3px 0px black;
            padding: 5px 15px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div>
        <h1>Mona Al Akhras</h1>
        <img src="mona.jpeg" alt="Mona Al Akhras" width="100" height="100"> 
        <p>
            <a href="https://github.com/Mona-Alakhras"><i class="fa-brands fa-github"></i>my github</a>
            <a href="https://www.linkedin.com/in/mona-alakhars-748a4117b/"><i class="fa-brands fa-linkedin"></i>my linkedin</a>
            <a href="mailto:monaalakhars00@gmail.com"><i class="fa-solid fa-envelope"></i>my email</a>
        </p>
    </div>

    <div>
        <h2>Technologies</h2>
        <table>
            <tr>
                <th>Front-End</th>
                <th>Python</th>
                <th>JavaScript</th>
                <th>Database</th>
                <th>Concepts</th>
            </tr>

            <tr>
                <td>HTML5</td>
                <td>Django</td>
                <td>Express</td>
                <td>MySQL</td>
                <td>AJAX</td>
             </tr>
             
            <tr>
                <td>CSS3</td>
                <td>Flask</td>
                <td>Mongoose</td>
                <td>MongoDB</td>
                <td>OOP</td>
            </tr>
             
            <tr>
                <td>Bootstrap</td>
                <td>Unittest</td>
                <td>React</td>
                <td></td>
                <td>REST</td>
            </tr>
        </table>
    </div>

    <div>
        <h2>Social Snakes</h2>
        <div class="code-box">
            <i class="fa-solid fa-code"></i>
        </div>

        <p>Social Media App made in Python - 
            <a href="https://github.com/Mona-Alakhras" target="_blank">code</a> | <a href="https://social-snakes.herokuapp.com/" target="_blank">deployed</a>
        </p>
    </div>

    <div>
        <h2>Contact Me</h2>

        <label for="name">Name:</label>
        <input type="text" id="name" name="name"> 

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"> 
        <br>

        <p>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" cols="20"></textarea>
        </p>
        <button type="submit">Send Message</button>
    </div>
</body>    
</html>
